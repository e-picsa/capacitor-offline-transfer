<div>
  <div class="titlebar">
    <h1>Offline Transfer</h1>
  </div>
  <main>
    <div id="notification-area"></div>
    <div id="error-banner" class="error-banner"></div>

    <section>
      <h3>1. Setup</h3>
      <div class="field">
        <label>P2P Strategy</label>
        <select id="strategy-select">
          <option value="P2P_STAR">P2P Star (1-to-many)</option>
          <option value="P2P_CLUSTER" selected>P2P Cluster (Mesh)</option>
          <option value="P2P_POINT_TO_POINT">P2P Point-to-Point (Direct)</option>
        </select>
      </div>
      <div class="field">
        <label>Log Level</label>
        <select id="log-level-select">
          <option value="0">None</option>
          <option value="1">Error</option>
          <option value="2">Warn</option>
          <option value="3" selected>Info (Default)</option>
          <option value="4">Debug</option>
          <option value="5">Verbose</option>
        </select>
      </div>
      <div style="display: flex; flex-wrap: wrap">
        <button class="button" id="init-btn">Initialize</button>
        <span id="init-status" class="status-badge"></span>
        <button class="button secondary" id="check-perms">Check Perms</button>
        <button class="button secondary" id="request-perms">Request Perms</button>
      </div>
    </section>

    <div id="main-controls" style="display: none">
      <section>
        <h3>2. Connections</h3>
        <div style="display: flex; flex-wrap: wrap">
          <button class="button" id="advertise-btn" disabled>Advertise</button>
          <span id="advertise-status" class="status-badge"></span>
          <button class="button" id="discovery-btn" disabled>Discover</button>
          <span id="discovery-status" class="status-badge"></span>
        </div>

        <button class="button danger" id="stop-btn" disabled>Stop All</button>

        <div class="device-list" id="devices-list" style="margin-top: 15px">
          <div style="color: #8e8e93; font-size: 0.9em; padding: 10px">No devices found yet...</div>
        </div>
      </section>

      <section>
        <h3>3. Transfer</h3>
        <div class="field">
          <label>Text Message</label>
          <div style="display: flex; gap: 8px">
            <input type="text" id="message-input" placeholder="Type here..." />
            <button class="button" id="send-btn" disabled style="margin: 0">Send</button>
          </div>
        </div>
        <div class="field">
          <label>File Transfer</label>
          <button class="button secondary" id="send-file-btn" disabled style="margin-left: 0">
            Pick &amp; Send Image
          </button>
        </div>
        <div id="progress-container" class="progress-container" style="display: none">
          <div style="display: flex; justify-content: space-between; font-size: 0.75em; margin-bottom: 4px">
            <span id="progress-filename">Sending...</span>
            <span id="progress-text">0%</span>
          </div>
          <div class="progress-bg">
            <div id="progress-bar" class="progress-fill"></div>
          </div>
        </div>
      </section>

      <section id="dev-tools">
        <h3>Dev Tools</h3>
        <div style="display: flex; flex-wrap: wrap">
          <button class="button secondary" id="share-system-btn">Share via System</button>
          <button class="button" id="start-lan-btn">Start LAN Server</button>
        </div>
        <div id="lan-server-controls" style="display: none; margin-top: 10px">
          <div class="dev-tools-note">
            <strong>LAN Server Running</strong> &mdash; Client emulator: set up port forwarding then connect via<br />
            <code id="lan-server-url" style="font-size: 0.85em; word-break: break-all"></code>
          </div>
          <div id="manual-connect-area" style="margin-top: 8px">
            <label style="font-size: 0.75em; color: #8e8e93">Manual Connect (client emulator)</label>
            <div style="display: flex; gap: 8px; margin-top: 4px">
              <input
                type="text"
                id="manual-url-input"
                placeholder="http://localhost:8080"
                value="http://localhost:8080"
              />
              <button class="button secondary" id="manual-connect-btn" style="margin: 0">Connect</button>
              <span id="manual-connect-status" class="status-badge"></span>
            </div>
          </div>
          <button class="button danger" id="stop-lan-btn" style="margin-top: 8px">Stop LAN Server</button>
        </div>
      </section>
    </div>

    <label>Log Console</label>
    <div class="message-box" id="messages">Ready.</div>
  </main>
</div>
